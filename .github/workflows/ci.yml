name: CI

on:
  push:
  pull_request:

# GITHUB_TOKEN を最小権限に固定する。pull_request は fork のコード（build.rs/テスト）を
# 実行しうるため、read のみを与える（secret も使わない）。
permissions:
  contents: read

# 直近の push だけを残して古い実行はキャンセルする。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # サードパーティ action は 40 桁 commit SHA に pin する（.github/dependabot.yml で更新）。
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # rust-toolchain.toml（1.97.0 + rustfmt/clippy）が SSOT。version を workflow に二重記載しない。
      - name: Install toolchain from rust-toolchain.toml
        run: rustup toolchain install
      - name: Versions
        run: |
          rustc --version
          cargo --version

      # Cargo.lock を CI 契約として強制する（--locked）。crate は cache 未使用なので毎回
      # registry から取得し、Cargo.lock + checksum で固定される（vendored なのは Unicode 表と
      # spec/vectors のみ）。
      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked
