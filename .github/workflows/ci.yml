name: CI

on:
  push:
  pull_request:

# Pin GITHUB_TOKEN to the least privilege. pull_request may run fork code (build.rs/tests),
# so grant read only (and use no secrets).
permissions:
  contents: read

# Keep only the latest push; cancel older in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Pin third-party actions to a 40-char commit SHA (updated via .github/dependabot.yml).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Do not leave GITHUB_TOKEN in the git config. Prevents a subsequent untrusted PR's
          # build.rs/tests from reading and exfiltrating the token (this CI does no later push).
          persist-credentials: false

      # rust-toolchain.toml (1.97.0 + rustfmt/clippy) is the single source of truth; do not duplicate the version here.
      - name: Install toolchain from rust-toolchain.toml
        run: rustup toolchain install
      - name: Versions
        run: |
          rustc --version
          cargo --version

      # Enforce Cargo.lock as a CI contract (--locked). Crates are fetched from the registry every
      # time (no cache) and pinned by Cargo.lock + checksums (only the Unicode table and spec/vectors
      # are vendored).
      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked
